services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: virusmore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d virusmore"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - virusmore_dev

  server:
    image: oven/bun:1.3.5-slim
    working_dir: /app
    volumes:
      - .:/app
      - linux_node_modules:/app/node_modules
      - bun_cache:/root/.bun
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/virusmore
      CORS_ORIGIN: http://localhost:4321
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
    command: sh -c "bun install && bun run --hot apps/server/src/index.ts"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - virusmore_dev

  web:
    image: oven/bun:1.3.5-slim
    working_dir: /app
    volumes:
      - .:/app
      - linux_node_modules:/app/node_modules
      - bun_cache:/root/.bun
    environment:
      NODE_ENV: development
      PUBLIC_SERVER_URL: http://localhost:3000
      SERVER_URL: http://server:3000
    command: sh -c "bun install && bun run --cwd apps/web dev -- --host 0.0.0.0"
    ports:
      - "4321:4321"
    depends_on:
      - server
    networks:
      - virusmore_dev

volumes:
  postgres_dev_data:
  bun_cache:
  linux_node_modules:

networks:
  virusmore_dev:
    driver: bridge
